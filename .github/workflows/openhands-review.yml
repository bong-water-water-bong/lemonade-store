name: openhands-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    name: OpenHands PR review
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.draft == false }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            | head -c 51200 > /tmp/pr.diff

      - name: Sanitize diff (strip secrets-like patterns before AI review)
        run: |
          python3 -c "
          import re, pathlib
          diff = pathlib.Path('/tmp/pr.diff').read_text(errors='replace')
          patterns = [
              (r'(?i)(api[_-]?key|secret|token|password|auth[_-]?token|access[_-]?key)\s*[:=]\s*[\"'\\'']?[A-Za-z0-9+/=_\-.]+[\"'\\'']?', r'\\1=***REDACTED***'),
              (r'(?i)(?:mongodb|postgres|mysql|redis|jdbc)://[^\s]+', '***REDACTED_CONNECTION_STRING***'),
              (r'(?i)sk-[A-Za-z0-9]{20,}', 'sk-***REDACTED***'),
              (r'(?i)ghp_[A-Za-z0-9]{20,}', 'ghp_***REDACTED***'),
              (r'(?i)AKIA[0-9A-Z]{16}', 'AKIA***REDACTED***'),
          ]
          for pattern, replacement in patterns:
              diff = re.sub(pattern, replacement, diff)
          pathlib.Path('/tmp/pr.diff').write_text(diff)
          print('Diff sanitized before AI review')
          "

      - name: Review with OpenHands
        env:
          OPENHANDS_API_KEY: ${{ secrets.OPENHANDS_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.error, urllib.request, pathlib, subprocess, sys

          api_key = os.environ.get("OPENHANDS_API_KEY")
          if not api_key:
              print("OPENHANDS_API_KEY is not set. Skipping OpenHands review.")
              sys.exit(0)

          diff = pathlib.Path("/tmp/pr.diff").read_text(errors="replace")

          prompt = (
              "You are a careful code reviewer. Review the following PR diff "
              "and give concise, actionable feedback. Focus on correctness, "
              "security, test coverage, and edge cases. Format as GitHub Markdown.\n\n"
              "```diff\n" + diff + "\n```"
          )

          payload = json.dumps({
              "messages": [{"role": "user", "content": prompt}],
              "model": "anthropic/claude-sonnet-4-5-20250929",
              "max_tokens": 1024,
          }).encode()

          req = urllib.request.Request(
              "https://app.all-hands.dev/api/v1/chat/completions",
              data=payload,
              headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {api_key}",
              },
          )
          try:
              with urllib.request.urlopen(req, timeout=120) as r:
                  data = json.load(r)
          except urllib.error.HTTPError as exc:
              detail = exc.read().decode(errors="replace")
              print(f"OpenHands review skipped: API returned HTTP {exc.code}.")
              print(detail[:2000])
              sys.exit(0)
          except Exception as exc:
              print(f"OpenHands review skipped: {exc}")
              sys.exit(0)

          review = data["choices"][0]["message"]["content"]
          body = (
              "### OpenHands review\n\n" + review
              + "\n\n---\n*Automated review via openhands-review workflow*"
          )

          subprocess.run(
              ["gh", "pr", "comment",
               os.environ["PR_NUMBER"],
               "--repo", os.environ["REPO"],
               "--body", body],
              check=True,
          )
          PYEOF
