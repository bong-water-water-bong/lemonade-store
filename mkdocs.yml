site_name: Lemonade Store
site_description: Offline-first ma-and-pa retail suite. Contracts for a department-shaped store OS.
site_url: https://bong-water-water-bong.github.io/lemonade-store/
repo_url: https://github.com/bong-water-water-bong/lemonade-store
repo_name: bong-water-water-bong/lemonade-store
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.top
    - navigation.sections
    - content.code.copy
    - toc.integrate
  palette:
    - scheme: default
      primary: yellow
      accent: amber
    - scheme: slate
      primary: yellow
      accent: amber

nav:
  - Home: index.md
  - Spec: SPEC.md
  - Departments: DEPARTMENTS.md
  - Events: EVENTS.md
  - Data layout: DATA_LAYOUT.md
  - Tie Dye Farms: TIE_DYE_FARMS.md
  - Cloudflare website: CLOUDFLARE_WEBSITE.md
  - Build order: BUILD_ORDER.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

strict: true
